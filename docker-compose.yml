# Single entry port for local dev: http://localhost:8080 → /, /admin, /api, /static/
#
# Terminal 1 — Django (must listen on all interfaces so Docker can reach it):
#   python manage.py runserver 0.0.0.0:8000
# Terminal 2 — Astro dev (same):
#   cd frontend && npm run dev -- --host 0.0.0.0 --port 4321
# Terminal 3:
#   docker compose up --build
#
# If Astro uses another port, set FRONTEND_PORT in `environment` below.
#
# Railway: BACKEND_HOST / FRONTEND_HOST must be the full private hostname
# (e.g. my-service.railway.internal), not the short service slug alone.
services:
  nginx:
    build: ./nginx
    ports:
      - "8080:80"
    environment:
      PORT: "80"
      BACKEND_HOST: host.docker.internal
      BACKEND_PORT: "8000"
      FRONTEND_HOST: host.docker.internal
      FRONTEND_PORT: "4321"
    extra_hosts:
      - "host.docker.internal:host-gateway"
